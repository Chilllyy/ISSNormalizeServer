<html lang="en">
<head>
    <title id="title">Urine Tank: -1%</title>
    <link id="favicon" rel="shortcut icon" href="favicon.ico" type="image/x-icon">
</head>
<img id="image" src="iss.png" alt="ISS Icon">
<b id="display">-1%</b>
</html>

<style>
img {
    image-rendering: pixelated;
}
</style>

<script>
    var value = 0;
    var display = document.getElementById("display");
    var image = document.getElementById("image");
    var title = document.getElementById("title");
    var favicon = document.getElementById("favicon");
    async function loop() {
        try {
            var url = window.location.protocol + "//" + window.location.hostname + ":" + window.location.port;
            const response = await fetch(url);

            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }

            const data = await response.json();

            var newValue = data['value'];
            var newValueInt = parseInt(newValue);
            if (newValueInt !== value) {
                image.src = "iss_notif.png";
                favicon.href = "favicon_notif.ico";
                setTimeout(resetIcon, 3000);
            }
            value = newValueInt;
            display.innerHTML = value + "%";
            title.innerHTML = `Urine Tank: ${value}%`
            console.log("New Value " + newValue);
        } catch (error) {
            console.error("Fetch Error: ", error);
        }

        setTimeout(loop, 30000);
    }

    async function resetIcon() {
        image.src = "iss.png";
        favicon.href = "favicon.ico";
    }

    loop();
</script>
